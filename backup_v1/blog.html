<!DOCTYPE html>
<html lang="tr">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALITH | Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { calith: { orange: '#FF6B35', dark: '#0A0A0A', gray: '#1A1A1A', accent: '#00D9FF' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Oswald', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="font-sans antialiased bg-calith-dark text-white">

<div class="grain"></div>

<nav id="global-nav" class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
            <div class="flex items-center gap-2 cursor-pointer" id="logo-container" onclick="window.location.href='index.html'">
                <div class="w-10 h-10 bg-gradient-to-br from-calith-orange to-calith-accent rounded-lg flex items-center justify-center">
                    <i data-lucide="dumbbell" class="w-6 h-6 text-white"></i>
                </div>
                <span class="font-display text-2xl font-bold tracking-wider">CALITH</span>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">ANA SAYFA</a>
                <a href="shop.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">EKİPMAN</a>
                <a href="blog.html" class="text-white font-medium text-sm">BLOG</a>
                <a href="skills.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">PROGRAMLAR</a>
                <a href="premium.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">PREMIUM</a>
                <a href="about.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">HAKKIMIZDA</a>
            </div>
            <div class="flex items-center gap-4">
                <button class="relative p-2 text-gray-400 hover:text-white transition-colors" onclick="toggleCart()">
                    <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                    <span id="cart-badge" class="absolute -top-1 -right-1 w-5 h-5 bg-calith-orange text-white text-xs rounded-full flex items-center justify-center font-bold hidden">0</span>
                </button>
                <button class="md:hidden p-2 text-white" onclick="toggleMobileMenu()" aria-label="Menü">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </div>
    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-white/5 bg-calith-dark">
        <div class="px-4 py-4 space-y-3 font-medium text-sm">
            <a href="index.html" class="block text-gray-400 hover:text-white py-2">ANA SAYFA</a>
            <a href="shop.html" class="block text-gray-400 hover:text-white py-2">EKİPMAN</a>
            <a href="blog.html" class="block text-white py-2">BLOG</a>
            <a href="skills.html" class="block text-gray-400 hover:text-white py-2">PROGRAMLAR</a>
            <a href="premium.html" class="block text-gray-400 hover:text-white py-2">PREMIUM</a>
            <a href="about.html" class="block text-gray-400 hover:text-white py-2">HAKKIMIZDA</a>
        </div>
    </div>
</nav>

<section id="blog" class="min-h-screen pt-32 pb-20 fade-in">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <h1 class="font-display text-5xl md:text-7xl font-bold mb-6 tracking-tight">KONDİSYON <span class="gradient-text">& BİLGİ</span></h1>
            <p class="text-xl text-gray-400 max-w-2xl mx-auto">Calisthenics dünyasından en güncel teknikler, beslenme tüyoları ve makaleler.</p>
        </div>
        <div id="blog-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>
</section>

<section id="blog-detail" class="hidden min-h-screen pt-32 pb-20 fade-in">
    <div class="max-w-4xl mx-auto px-4">
        <button onclick="showSection('blog')" class="mb-10 text-gray-400 hover:text-white flex items-center gap-2 group">
            <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i> Geri Dön
        </button>
        <div id="post-content" class="bg-calith-gray/30 border border-white/5 p-8 md:p-12 rounded-3xl"></div>
    </div>
</section>

</footer>

<!-- Cart Elements -->
<div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-96 bg-calith-gray z-50 transform translate-x-full transition-transform duration-300 shadow-2xl">
    <div class="h-full flex flex-col">
        <div class="flex items-center justify-between p-6 border-b border-white/10">
            <h3 class="font-display text-xl font-bold uppercase">SEPETİN</h3>
            <button onclick="toggleCart()" class="p-2 hover:bg-white/10 rounded-full transition-colors" aria-label="Sepeti Kapat"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6"></div>
        <div class="border-t border-white/10 p-6 space-y-4">
            <div class="flex justify-between text-sm"><span class="text-gray-400">Ara Toplam</span><span id="cart-subtotal" class="font-semibold">0₺</span></div>
            <div class="flex justify-between text-lg font-bold border-t border-white/10 pt-4"><span>Toplam</span><span id="cart-total">0₺</span></div>
            <button onclick="checkout()" class="w-full btn-primary py-4 rounded-full font-bold">ÖDEMEYE GEÇ</button>
        </div>
    </div>
</div>
<div id="cart-overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleCart()"></div>

<!-- Toast -->
<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-calith-orange text-white px-8 py-4 rounded-full shadow-2xl z-50 transform translate-y-32 transition-transform duration-500 flex items-center gap-3"><i data-lucide="check-circle" class="w-5 h-5"></i><span id="toast-msg" class="font-bold text-sm"></span></div>

<script src="js/app.js"></script>
<script>
    lucide.createIcons();
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
</body>
</html>
