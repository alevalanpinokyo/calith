<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALITH | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="font-sans antialiased bg-calith-dark text-white">
<div class="grain"></div>

<nav id="global-nav" class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-10 h-10 bg-gradient-to-br from-calith-orange to-calith-accent rounded-lg flex items-center justify-center">
                    <i data-lucide="dumbbell" class="w-6 h-6 text-white"></i>
                </div>
                <span class="font-display text-2xl font-bold tracking-wider">CALITH</span>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">ANA SAYFA</a>
                <a href="shop.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">EKİPMAN</a>
                <a href="blog.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">BLOG</a>
                <a href="skills.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">PROGRAMLAR</a>
                <a href="premium.html" class="text-white font-medium text-sm">PREMIUM</a>
                <a href="about.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">HAKKIMIZDA</a>
            </div>
            <div class="flex items-center gap-4">
                <button class="relative p-2 text-gray-400 hover:text-white transition-colors" onclick="toggleCart()">
                    <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                    <span id="cart-badge" class="absolute -top-1 -right-1 w-5 h-5 bg-calith-orange text-white text-xs rounded-full flex items-center justify-center font-bold hidden">0</span>
                </button>
                <button class="md:hidden p-2 text-white" onclick="toggleMobileMenu()">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </div>
    <div id="mobile-menu" class="hidden md:hidden border-t border-white/5 bg-calith-dark">
        <div class="px-4 py-4 space-y-3 font-medium text-sm">
            <a href="index.html" class="block text-gray-400 py-2">ANA SAYFA</a>
            <a href="shop.html" class="block text-gray-400 py-2">EKİPMAN</a>
            <a href="blog.html" class="block text-gray-400 py-2">BLOG</a>
            <a href="skills.html" class="block text-gray-400 py-2">PROGRAMLAR</a>
            <a href="premium.html" class="block text-white py-2">PREMIUM</a>
            <a href="about.html" class="block text-gray-400 py-2">HAKKIMIZDA</a>
        </div>
    </div>
</nav>

<section class="min-h-screen pt-32 pb-20 flex flex-col items-center justify-center text-center px-4">
    <h1 class="font-display text-5xl md:text-8xl font-bold mb-6">CALITH <span class="gradient-text">PREMIUM</span></h1>
    <p class="text-gray-400 max-w-2xl mx-auto text-lg mb-12">Kişiye özel koçluk, profesyonel antrenman programları ve beslenme takibi.</p>
    <div class="grid md:grid-cols-2 gap-8 max-w-4xl w-full">
        <div class="product-card p-10 rounded-3xl border-calith-orange/20">
            <h3 class="font-display text-2xl font-bold mb-4">AYLIK PLAN</h3>
            <p class="text-4xl font-bold mb-8">299₺ <span class="text-sm font-normal text-gray-500">/ay</span></p>
            <button class="w-full btn-primary py-4 rounded-xl font-bold">KATIL</button>
        </div>
        <div class="product-card p-10 rounded-3xl border-calith-accent/20">
            <h3 class="font-display text-2xl font-bold mb-4">YILLIK PLAN</h3>
            <p class="text-4xl font-bold mb-8">199₺ <span class="text-sm font-normal text-gray-500">/ay</span></p>
            <button class="w-full bg-calith-accent text-black py-4 rounded-xl font-bold">KATIL</button>
        </div>
    </div>
</section>

<footer class="bg-calith-dark border-t border-white/5 pt-16 pb-8 text-center text-gray-500 text-sm">
    <p>© 2025 CALITH. Tüm hakları saklıdır.</p>
</footer>

<div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-96 bg-calith-gray z-50 transform translate-x-full transition-transform duration-300 shadow-2xl">
    <div class="h-full flex flex-col p-6"><button onclick="toggleCart()" class="self-end mb-4"><i data-lucide="x" class="w-6 h-6"></i></button><div id="cart-items" class="flex-1 overflow-y-auto"></div></div>
</div>
<div id="cart-overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleCart()"></div>
<div id="toast" class="toast fixed bottom-8 left-1/2 -translate-x-1/2 bg-calith-gray text-white px-6 py-3 rounded-full shadow-lg z-50 flex items-center gap-3"><i data-lucide="check-circle" class="w-5 h-5 text-green-400"></i><span id="toast-msg"></span></div>

<script src="js/app.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
