<!DOCTYPE html>

<head>

    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Profilim | CALITH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        calith: {
                            orange: '#FF6B35',
                            dark: '#0A0A0A',
                            gray: '#1A1A1A',
                            light: '#2A2A2A',
                            accent: '#00D9FF'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Oswald', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans antialiased bg-calith-dark text-white">
<div class="grain"></div>

<!-- Navigation -->
<nav id="global-nav" class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
            <a href="index.html" class="flex items-center gap-2 cursor-pointer" id="logo-container" title="Ana Sayfaya Git">
                <div class="shrink-0 w-10 h-10 bg-gradient-to-br from-calith-orange to-calith-accent rounded-lg flex items-center justify-center">
                    <i data-lucide="dumbbell" class="w-6 h-6 text-white"></i>
                </div>
                <span class="font-display text-2xl font-bold tracking-wider">CALITH</span>
            </a>
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-white font-medium text-sm">ANA SAYFA</a>
                <a href="skills.html" class="text-white font-medium text-sm">PROGRAMLAR</a>
                <a href="shop.html" class="text-white font-medium text-sm">EKİPMAN</a>
                <a href="blog.html" class="text-white font-medium text-sm">ÖĞREN</a>
                <a href="premium.html" class="text-calith-orange font-bold text-sm tracking-widest uppercase">KOÇLUK</a>
            </div>
            <div class="flex items-center gap-4">
                <button class="md:hidden p-2 text-white" title="Menü" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </div>
    <div id="mobile-menu" class="hidden md:hidden border-t border-white/5 bg-calith-dark">
        <div class="px-4 py-4 space-y-3">
            <a href="index.html" class="block text-white py-2">ANA SAYFA</a>
            <a href="skills.html" class="block text-white py-2">PROGRAMLAR</a>
            <a href="shop.html" class="block text-white py-2">EKİPMAN</a>
            <a href="blog.html" class="block text-white py-2">ÖĞREN</a>
            <a href="premium.html" class="block text-calith-orange font-bold py-2 uppercase tracking-widest">KOÇLUK</a>
        </div>
    </div>
</nav>

<!-- Profile Content -->
<main class="min-h-screen pt-32 pb-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div id="profile-mount">
            <!-- renderProfileSection() buraya inject edecek -->
            <div class="py-24 text-center animate-pulse">
                <p class="text-gray-600 font-bold uppercase tracking-widest text-xs">Profil yükleniyor...</p>
            </div>
        </div>
    </div>
</main>

    <script src="js/app.js?v=202604262342"></script>
    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', async () => {
            const sb = getSupabase();
            if (!sb) return;

            // İlk olarak kullanıcıyı kontrol et
            const { data: { user } } = await sb.auth.getUser();
            if (!user) { 
                window.location.href = 'index.html'; 
                return; 
            }

            // Temel arayüzü bas
            if (typeof renderProfileSection === 'function') renderProfileSection();

            // Tüm verileri PARALEL yükle (Hız optimizasyonu)
            await Promise.all([
                loadProfileData(user),
                loadPosts()
            ]);

            // Her şey hazır olunca varsayılan sekmeyi aç
            if (typeof switchProfileTab === 'function') switchProfileTab('ready');
            
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>
</html>
