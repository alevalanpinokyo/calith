<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALITH | Skills & Programlar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        calith: {
                            orange: '#FF6B35',
                            dark: '#0A0A0A',
                            gray: '#1A1A1A',
                            light: '#2A2A2A',
                            accent: '#00D9FF'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Oswald', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans antialiased bg-calith-dark text-white">

<div class="grain"></div>

<!-- Navigation -->
<nav id="global-nav" class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
            <!-- Logo -->
            <div class="flex items-center gap-2 cursor-pointer" id="logo-container" onclick="window.location.href='index.html'">
                <div class="w-10 h-10 bg-gradient-to-br from-calith-orange to-calith-accent rounded-lg flex items-center justify-center">
                    <i data-lucide="dumbbell" class="w-6 h-6 text-white"></i>
                </div>
                <span class="font-display text-2xl font-bold tracking-wider">CALITH</span>
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">ANA SAYFA</a>
                <a href="shop.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">EKİPMAN</a>
                <a href="blog.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">BLOG</a>
                <a href="skills.html" class="text-white font-medium text-sm">PROGRAMLAR</a>
                <a href="premium.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">PREMIUM</a>
                <a href="about.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">HAKKIMIZDA</a>
            </div>

            <div class="flex items-center gap-4">
                <button class="relative p-2 text-gray-400 hover:text-white transition-colors" onclick="toggleCart()">
                    <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                    <span id="cart-badge" class="absolute -top-1 -right-1 w-5 h-5 bg-calith-orange text-white text-xs rounded-full flex items-center justify-center font-bold hidden">0</span>
                </button>
                <button class="md:hidden p-2 text-white" onclick="toggleMobileMenu()">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </div>
</nav>

<!-- SKILL LIBRARY -->
<section id="skill-library" class="min-h-screen pt-32 pb-20 fade-in">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <span class="text-calith-orange font-semibold text-sm tracking-wider uppercase">Skill Library</span>
            <h1 class="font-display text-5xl md:text-7xl font-bold mt-4 mb-6">HAREKET <span class="gradient-text">REHBERİ</span></h1>
            <p class="text-gray-400 max-w-2xl mx-auto text-lg">Vücut ağırlığı antrenmanının temelinden ileri seviyesine tüm hareketler.</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Example Skill Cards -->
            <div class="product-card p-6 rounded-3xl card-hover group cursor-pointer" onclick="showSkill('muscle-up')">
                <div class="w-12 h-12 bg-calith-orange/10 rounded-2xl flex items-center justify-center mb-6 text-calith-orange group-hover:scale-110 transition-transform">
                    <i data-lucide="arrow-up" class="w-6 h-6"></i>
                </div>
                <h3 class="font-display text-xl font-bold mb-2">Muscle Up</h3>
                <p class="text-gray-500 text-xs">Seviye: İleri</p>
            </div>
            <div class="product-card p-6 rounded-3xl card-hover group cursor-pointer" onclick="showSkill('handstand')">
                <div class="w-12 h-12 bg-calith-accent/10 rounded-2xl flex items-center justify-center mb-6 text-calith-accent group-hover:scale-110 transition-transform">
                    <i data-lucide="refresh-cw" class="w-6 h-6"></i>
                </div>
                <h3 class="font-display text-xl font-bold mb-2">Handstand</h3>
                <p class="text-gray-500 text-xs">Seviye: Orta</p>
            </div>
            <!-- More would be rendered via JS if needed -->
        </div>
    </div>
</section>

<!-- Footers and Cart same as index... simplified for breath -->
<footer class="bg-calith-dark border-t border-white/5 pt-16 pb-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm">
        <p>© 2025 CALITH. Tüm hakları saklıdır.</p>
    </div>
</footer>

<script src="js/app.js"></script>
<script>
    lucide.createIcons();
    const observerOptions = { threshold: 0.1, rootMargin: '0px 0px -50px 0px' };
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
    }, observerOptions);
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
</body>
</html>
