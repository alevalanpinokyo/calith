<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>CALITH | Bize Katıl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js?v=202604271909" defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        calith: {
                            orange: '#FF6B35',
                            dark: '#0A0A0A',
                            gray: '#1A1A1A',
                            light: '#2A2A2A',
                            accent: '#00D9FF'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Oswald', 'sans-serif']
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            color-scheme: dark;
        }
        body { background-color: #0A0A0A; }
        .glass-card {
            background: linear-gradient(145deg, #2A2A2A 0%, #171717 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.8);
        }
        .link-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,107,53,0.1), transparent);
            transition: 0.5s;
        }
        .link-item:hover::before {
            left: 100%;
        }
        .link-item:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255,107,53,0.5);
            box-shadow: 0 10px 30px -10px rgba(255,107,53,0.3);
        }
        .link-item:active {
            transform: scale(0.98);
            border-color: rgba(255,107,53,0.8);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }
        .brand-text {
            background: linear-gradient(to right, #FF6B35, #00D9FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .delay-2s { animation-delay: 2s; }
        .delay-4s { animation-delay: 4s; }
        .bg-grain {
            background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');
            opacity: 0.03;
        }
    </style>
</head>
<body class="font-sans antialiased text-white min-h-screen relative overflow-x-hidden selection:bg-calith-orange selection:text-white">

    <!-- Animated Background Elements -->
    <div class="fixed inset-0 min-h-screen z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-calith-orange/20 rounded-full blur-[120px] animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-calith-accent/10 rounded-full blur-[120px] animate-blob delay-2s"></div>
        <div class="absolute top-[40%] left-[60%] w-[30%] h-[30%] bg-purple-500/10 rounded-full blur-[100px] animate-blob delay-4s"></div>
        <!-- Grain overlay -->
        <div class="absolute inset-0 bg-grain"></div>
    </div>

    <main class="relative z-10 w-full max-w-2xl mx-auto px-4 py-16 sm:py-24 flex flex-col items-center">
        
        <!-- Profile / Header -->
        <div class="flex flex-col items-center mb-10 text-center animate-fade-in-up">
            <a href="index.html" class="relative mb-6 group cursor-pointer" title="Ana Sayfaya Git">
                <div class="absolute inset-0 bg-gradient-to-br from-calith-orange to-calith-accent rounded-2xl blur opacity-60 group-hover:opacity-100 transition duration-500"></div>
                <div class="relative w-24 h-24 sm:w-28 sm:h-28 bg-calith-dark rounded-2xl border border-white/20 flex items-center justify-center shadow-2xl overflow-hidden">
                    <i data-lucide="dumbbell" class="w-12 h-12 text-white transform group-hover:scale-110 transition-transform duration-500"></i>
                </div>
            </a>
            
            <h1 class="font-display text-3xl sm:text-4xl font-bold tracking-wider mb-2">CALITH <span class="text-calith-orange">.</span></h1>
            <p class="text-gray-400 font-medium text-sm sm:text-base max-w-md">
                Kendi Vücudunla Çalış. <span class="text-white">Ekipmansız</span> başlangıç, profesyonel antrenman.
            </p>
        </div>

        <!-- Links Container -->
        <div class="w-full space-y-4 flex flex-col items-center" id="dynamic-links-container">
            <!-- Skeleton Loading UI -->
            <div class="w-full max-w-xl h-20 bg-white/5 rounded-2xl animate-pulse"></div>
            <div class="w-full max-w-xl h-20 bg-white/5 rounded-2xl animate-pulse delay-75"></div>
            <div class="w-full max-w-xl h-20 bg-white/5 rounded-2xl animate-pulse delay-150"></div>
            <div class="w-full max-w-xl h-20 bg-white/5 rounded-2xl animate-pulse delay-300"></div>
        </div>

    </main>

    <!-- YOUTUBE MODAL (Yöntem 3) -->
    <div id="youtube-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="document.getElementById('youtube-modal').classList.add('hidden')"></div>
        <div class="relative w-full max-w-sm bg-[#1A1A1A] border border-white/10 rounded-3xl p-6 shadow-2xl transform transition-all text-center">
            <button aria-label="Kapat" title="Kapat" onclick="document.getElementById('youtube-modal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <i class="fa-brands fa-youtube text-4xl text-[#FF0000] mb-4"></i>
            <h3 class="font-display text-2xl font-bold uppercase mb-1 drop-shadow-md">YOUTUBE</h3>
            <p class="text-sm text-gray-400 mb-6">Hangi kanalı ziyaret etmek istiyorsun?</p>
            <div class="grid grid-cols-2 gap-4" id="youtube-modal-list">
                <!-- Dinamik YouTube hesapları buraya gelecek -->
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
