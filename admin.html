<!DOCTYPE html>
<html lang="tr">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALITH | Admin Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="font-sans antialiased bg-calith-dark text-white">
<div class="grain"></div>

<nav id="global-nav" class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
            <div class="flex items-center gap-2 cursor-pointer" id="logo-container" onclick="window.location.href='index.html'">
                <div class="w-10 h-10 bg-gradient-to-br from-calith-orange to-calith-accent rounded-lg flex items-center justify-center">
                    <i data-lucide="dumbbell" class="w-6 h-6 text-white"></i>
                </div>
                <span class="font-display text-2xl font-bold tracking-wider">CALITH</span>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">ANA SAYFA</a>
                <span class="text-white uppercase font-bold tracking-widest text-sm">ADMIN PANEL</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="logoutAdmin()" class="text-sm text-gray-400 hover:text-red-500 transition-colors">ÇIKIŞ →</button>
                <button class="md:hidden p-2 text-white" onclick="toggleMobileMenu()" aria-label="Menü">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </div>
    <div id="mobile-menu" class="hidden md:hidden border-t border-white/5 bg-calith-dark">
        <div class="px-4 py-4 space-y-3 font-medium text-sm">
            <a href="index.html" class="block text-gray-400 py-2">ANA SAYFA</a>
            <a href="shop.html" class="block text-gray-400 py-2">EKİPMAN</a>
            <a href="blog.html" class="block text-gray-400 py-2">BLOG</a>
            <a href="skills.html" class="block text-gray-400 py-2">PROGRAMLAR</a>
            <a href="premium.html" class="block text-gray-400 py-2">PREMIUM</a>
            <a href="about.html" class="block text-gray-400 py-2">HAKKIMIZDA</a>
        </div>
    </div>
</nav>

<section id="admin" class="min-h-screen pt-32 pb-20 px-4">
    <div class="max-w-6xl mx-auto">
        <div id="admin-login" class="max-w-md mx-auto py-20 text-center space-y-8">
            <div class="w-20 h-20 bg-white/5 border border-white/10 rounded-3xl flex items-center justify-center mx-auto"><i data-lucide="lock" class="w-10 h-10 text-calith-orange"></i></div>
            <h1 class="font-display text-4xl font-bold uppercase tracking-widest">GİRİŞ YAP</h1>
            
            <!-- Autofill engellemek için sahte giriş alanları -->
            <input type="text" title="username autofill prevention" aria-label="Username" class="hidden" autocomplete="username">
            <input type="password" title="password autofill prevention" aria-label="Password" class="hidden" autocomplete="current-password">
            
            <input type="email" id="admin-email" placeholder="E-posta Adresiniz" autocomplete="off" class="w-full border border-gray-300 px-6 py-5 rounded-2xl text-center text-2xl focus:outline-none focus:border-calith-orange mb-4" onkeypress="if(event.key === 'Enter') document.getElementById('admin-pass').focus()">
            <input type="password" id="admin-pass" placeholder="Şifrenizi Girin" autocomplete="new-password" class="w-full border border-gray-300 px-6 py-5 rounded-2xl text-center text-2xl focus:outline-none focus:border-calith-orange" onkeypress="if(event.key === 'Enter') checkAdmin()">
            <button onclick="checkAdmin()" class="w-full btn-primary h-16 rounded-2xl font-bold text-lg mt-6">ADMİN PANELİNE GİR</button>
        </div>

        <div id="admin-editor" class="hidden space-y-12">
            <div class="flex flex-wrap gap-4 p-1 bg-white/5 rounded-2xl border border-white/5 w-fit">
                <button onclick="switchAdminTab('blog')" id="tab-blog" class="px-8 py-3 rounded-xl font-bold text-sm bg-calith-orange text-white">BLOG YÖNETİMİ</button>
                <button onclick="switchAdminTab('products')" id="tab-products" class="px-8 py-3 rounded-xl font-bold text-sm text-gray-400 hover:text-white">ÜRÜN YÖNETİMİ</button>
                <button onclick="switchAdminTab('programs')" id="tab-programs" class="px-8 py-3 rounded-xl font-bold text-sm text-gray-400 hover:text-white">PROGRAM YÖNETİMİ</button>
            </div>
            
            <div id="section-blog" class="grid lg:grid-cols-3 gap-12">
                <div class="lg:col-span-1 space-y-6 bg-calith-gray/50 p-8 rounded-3xl border border-white/10">
                    <h3 class="font-display text-2xl font-bold uppercase">YAZI <span class="text-calith-orange">OLUŞTUR / DÜZENLE</span></h3>
                    <input type="hidden" id="post-edit-id">
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Başlık</label>
                            <input type="text" id="post-title" placeholder="Yazı Başlığı..." class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl outline-none focus:border-calith-orange text-white placeholder-gray-600">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Kategori</label>
                            <select id="post-category" title="Yazı Kategorisi" class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl focus:border-calith-orange outline-none mt-1 text-white">
                                <option value="temel">Temel Bilgiler</option>
                                <option value="ekipman">Ekipman Rehberi</option>
                                <option value="beslenme">Beslenme</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Kapak Görseli URL</label>
                                <input type="url" id="post-cover" placeholder="https://..." class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl outline-none focus:border-calith-orange text-white placeholder-gray-600">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Öne Çıkan Video URL</label>
                                <input type="url" id="post-video" placeholder="YouTube URL vb." class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl outline-none focus:border-calith-orange text-white placeholder-gray-600">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">İçerik (Zengin Metin)</label>
                            <div id="editor" contenteditable="true" class="bg-black/40 border border-white/10 rounded-xl p-4 min-h-[250px] outline-none prose prose-invert max-w-none text-sm overflow-y-auto"></div>
                        </div>
                        <button onclick="savePost()" id="btn-save-post" class="w-full btn-primary py-4 rounded-xl font-bold uppercase tracking-widest">YAZIYI YAYINLA</button>
                    </div>
                </div>
                <div class="lg:col-span-2 space-y-6">
                    <h2 class="font-display text-2xl font-bold uppercase">MEVCUT YAZILAR</h2>
                    <div id="admin-post-list" class="grid gap-4"></div>
                </div>
            </div>

            <div id="section-programs" class="hidden grid lg:grid-cols-3 gap-12">
                <div class="lg:col-span-1 space-y-6 bg-calith-gray/50 p-8 rounded-3xl border border-white/10">
                    <h3 class="font-display text-2xl font-bold uppercase">PROGRAM <span class="text-calith-orange">OLUŞTUR</span></h3>
                    <input type="hidden" id="prog-edit-id">
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Program Başlığı</label>
                            <input type="text" id="prog-title" placeholder="Program Adı..." class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl outline-none focus:border-calith-orange text-white placeholder-gray-600">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Seviye (Kategori)</label>
                            <select id="prog-category" title="Program Seviyesi" class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl focus:border-calith-orange outline-none mt-1 text-white">
                                <option value="program_baslangic">Başlangıç Seviye</option>
                                <option value="program_orta">Orta Seviye</option>
                                <option value="program_ileri">İleri Seviye</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Kapak Görseli URL</label>
                                <input type="url" id="prog-cover" placeholder="https://..." class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl outline-none focus:border-calith-orange text-white placeholder-gray-600">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Video URL (YouTube)</label>
                                <input type="url" id="prog-video" placeholder="Video Linki" class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl outline-none focus:border-calith-orange text-white placeholder-gray-600">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Program İçeriği (Günler, setler...)</label>
                            <div id="prog-editor" contenteditable="true" class="bg-black/40 border border-white/10 rounded-xl p-4 min-h-[250px] outline-none prose prose-invert max-w-none text-sm overflow-y-auto"></div>
                        </div>
                        <button onclick="saveProgram()" class="w-full btn-primary py-4 rounded-xl font-bold uppercase tracking-widest">PROGRAMI YAYINLA</button>
                    </div>
                </div>
                <div class="lg:col-span-2 space-y-6">
                    <h2 class="font-display text-2xl font-bold uppercase">MEVCUT PROGRAMLAR</h2>
                    <div id="admin-prog-list" class="grid gap-4"></div>
                </div>
            </div>

            <div id="section-products" class="hidden grid lg:grid-cols-3 gap-12">
                <div class="lg:col-span-1 space-y-6 bg-calith-gray/50 p-8 rounded-3xl border border-white/10">
                    <h3 class="font-display text-2xl font-bold uppercase">ÜRÜN <span class="text-calith-orange">İŞLEMLERİ</span></h3>
                    <input type="hidden" id="prod-edit-id">
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Ürün Adı</label>
                            <input type="text" id="prod-name" placeholder="Ürün Adı" class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl outline-none focus:border-calith-orange text-white placeholder-gray-600">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Kategori</label>
                            <select id="prod-category" title="Ürün Kategorisi" class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl focus:border-calith-orange outline-none mt-1 text-white">
                                <option value="bar">Barfiks</option>
                                <option value="parallettes">Paralel</option>
                                <option value="rings">Halka</option>
                                <option value="band">Band</option>
                                <option value="bundle">Set</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Fiyat (TL)</label>
                                <input type="number" id="prod-price" placeholder="0" title="Ürün Fiyatı" class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl focus:border-calith-orange outline-none mt-1 text-white placeholder-gray-600">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Eski Fiyat (Opsiyonel)</label>
                                <input type="number" id="prod-old-price" placeholder="0" title="Eski Fiyat" class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl focus:border-calith-orange outline-none mt-1 text-white placeholder-gray-600">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Rozet (Örn: Yeni)</label>
                                <input type="text" id="prod-badge" placeholder="Yeni" title="Ürün Rozeti" class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl focus:border-calith-orange outline-none mt-1 text-white placeholder-gray-600">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Görsel URL</label>
                                <input type="url" id="prod-image-url" placeholder="Görsel Linki" title="Görsel URL" class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl focus:border-calith-orange outline-none mt-1 text-white placeholder-gray-600">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Açıklama</label>
                            <textarea id="prod-desc" rows="3" placeholder="Ürün açıklaması..." title="Ürün Açıklaması" class="w-full bg-black/40 border border-white/10 px-4 py-3 rounded-xl focus:border-calith-orange outline-none mt-1 text-white resize-none placeholder-gray-600"></textarea>
                        </div>
                        <button onclick="saveProduct()" class="w-full btn-primary py-4 rounded-xl font-bold uppercase tracking-widest">Ürünü Kaydet</button>
                    </div>
                </div>
                <div class="lg:col-span-2 space-y-6">
                    <h3 class="font-display text-2xl font-bold uppercase">Ürün Listesi</h3>
                    <div id="admin-product-list" class="grid sm:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-calith-orange text-white px-8 py-4 rounded-full shadow-2xl z-50 transform translate-y-32 transition-transform duration-500 flex items-center gap-3"><i data-lucide="check-circle" class="w-5 h-5"></i><span id="toast-msg" class="font-bold text-sm"></span></div>

<script src="js/app.js"></script>
<script>
    lucide.createIcons();
    function switchAdminTab(tab) {
        document.getElementById('section-blog').classList.toggle('hidden', tab !== 'blog');
        document.getElementById('section-products').classList.toggle('hidden', tab !== 'products');
        document.getElementById('section-programs').classList.toggle('hidden', tab !== 'programs');
        document.getElementById('tab-blog').className = tab === 'blog' ? "px-8 py-3 rounded-xl font-bold text-sm bg-calith-orange text-white shadow-lg" : "px-8 py-3 rounded-xl font-bold text-sm text-gray-400 hover:text-white";
        document.getElementById('tab-products').className = tab === 'products' ? "px-8 py-3 rounded-xl font-bold text-sm bg-calith-orange text-white shadow-lg" : "px-8 py-3 rounded-xl font-bold text-sm text-gray-400 hover:text-white";
        document.getElementById('tab-programs').className = tab === 'programs' ? "px-8 py-3 rounded-xl font-bold text-sm bg-calith-orange text-white shadow-lg" : "px-8 py-3 rounded-xl font-bold text-sm text-gray-400 hover:text-white";
        if (tab === 'products') renderAdminProducts();
        if (tab === 'programs') renderAdminPrograms();
    }
</script>
</body>
</html>
